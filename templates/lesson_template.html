<!DOCTYPE html>
<html lang="{lang}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{title}</title>
  <script type="application/json" id="lesson-passport">{passport_json}</script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; max-width: 760px; margin: 0 auto; padding: 20px; line-height: 1.7; color: #243447; background: #f8fafc; }
    main { background: white; padding: 28px; border-radius: 16px; box-shadow: 0 4px 14px rgba(0,0,0,0.05); }
    .meta { color: #5b6b79; margin-bottom: 24px; }
    article { white-space: pre-wrap; }
    .action-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
    .action-btn, .speed-select {
      border: 1px solid #d9e2ec; background: white; color: #425466; border-radius: 10px;
      min-width: 38px; height: 38px; display: inline-flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 16px;
    }
    .action-btn[disabled] { opacity: 0.45; cursor: not-allowed; }
    .speed-select { padding: 0 8px; min-width: 74px; }
    .tts-status { color: #6b7a89; font-size: 12px; margin-left: 4px; }
  </style>
</head>
<body>
  <main>
    <div class="action-bar">
      <button type="button" class="action-btn" id="back-btn" title="Назад">←</button>
      <button type="button" class="action-btn" id="listen-btn" title="Прослушать">▶</button>
      <button type="button" class="action-btn" id="pause-btn" title="Пауза">⏸</button>
      <button type="button" class="action-btn" id="stop-btn" title="Стоп">⏹</button>
      <button type="button" class="action-btn" id="print-btn" title="Печать" disabled>🖨</button>
      <button type="button" class="action-btn" id="pdf-btn" title="PDF" disabled>📄</button>
      <button type="button" class="action-btn" id="original-btn" title="Оригинал" disabled>🔗</button>
      <select id="tts-speed" class="speed-select" title="Скорость">
        <option value="0.75">0.75×</option>
        <option value="1" selected>1.0×</option>
        <option value="1.25">1.25×</option>
        <option value="1.5">1.5×</option>
        <option value="1.75">1.75×</option>
        <option value="2">2.0×</option>
      </select>
      <span class="tts-status" id="tts-status">Готово</span>
    </div>
    <h1>{title}</h1>
    <div class="meta"><strong>{author}</strong>{cycle_line}<br>{date}</div>
    <article id="lesson-text">{body}</article>
  </main>
  <script>
    const lessonPassport = JSON.parse(document.getElementById('lesson-passport')?.textContent || '{}');
    const lessonTextEl = document.getElementById('lesson-text');
    const statusEl = document.getElementById('tts-status');
    const speedEl = document.getElementById('tts-speed');
    const synth = window.speechSynthesis;
    let activeUtterance = null;

    function setStatus(text) {
      if (statusEl) statusEl.textContent = text;
    }

    function getLessonText() {
      return (lessonTextEl?.innerText || lessonTextEl?.textContent || '').replace(/\s+/g, ' ').trim();
    }

    function stopSpeech() {
      if (synth) synth.cancel();
      activeUtterance = null;
      setStatus('Остановлено');
    }

    function playSpeech() {
      const text = getLessonText();
      if (!text || !synth) {
        setStatus('Озвучка недоступна');
        return;
      }
      if (synth.speaking) synth.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = (lessonPassport.lang || 'ru') === 'he' ? 'he-IL' : ((lessonPassport.lang || 'ru') === 'en' ? 'en-US' : 'ru-RU');
      utterance.rate = parseFloat(speedEl?.value || '1');
      utterance.onstart = () => setStatus('Читает…');
      utterance.onend = () => setStatus('Готово');
      utterance.onerror = () => setStatus('Ошибка озвучки');
      activeUtterance = utterance;
      synth.speak(utterance);
    }

    document.getElementById('back-btn')?.addEventListener('click', () => {
      window.location.href = '../index.html';
    });
    document.getElementById('listen-btn')?.addEventListener('click', playSpeech);
    document.getElementById('pause-btn')?.addEventListener('click', () => {
      if (!synth) return;
      if (synth.speaking && !synth.paused) {
        synth.pause();
        setStatus('Пауза');
      } else if (synth.paused) {
        synth.resume();
        setStatus('Читает…');
      }
    });
    document.getElementById('stop-btn')?.addEventListener('click', stopSpeech);
    speedEl?.addEventListener('change', () => {
      if (activeUtterance && synth?.speaking) {
        stopSpeech();
        playSpeech();
      }
    });
  </script>
</body>
</html>
