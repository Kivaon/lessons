<!DOCTYPE html>
<html lang="{lang}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{title}</title>
  <script type="application/json" id="lesson-passport">{passport_json}</script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; max-width: 760px; margin: 0 auto; padding: 20px; line-height: 1.7; color: #243447; background: #f8fafc; }
    main { background: white; padding: 28px; border-radius: 16px; box-shadow: 0 4px 14px rgba(0,0,0,0.05); }
    .meta { color: #5b6b79; margin-bottom: 24px; }
    article { white-space: pre-wrap; }
  </style>
</head>
<body>
  <main>
    <h1>{title}</h1>
    <div class="meta"><strong>{author}</strong>{cycle_line}<br>{date}</div>
    <article>{body}</article>
  </main>
</body>
</html>
