<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест библиотеки</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            line-height: 1.6;
            padding: 24px;
            background-color: #f9f9f9;
            color: #333;
            max-width: 500px;
            margin: 0 auto;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border-top: 4px solid #2980b9;
        }
        h1 { font-size: 20px; margin-top: 0; color: #2c3e50; }
        p { font-size: 16px; }
        .status {
            display: inline-block;
            background: #27ae60;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>📚 Проверка связи</h1>
        <p>Если вы видите этот текст на экране телефона, и он полностью помещается по ширине без необходимости скроллить вбок — значит, **всё работает идеально!**</p>
        <span class="status">Сайт активен</span>
    </div>

</body>
</html>
